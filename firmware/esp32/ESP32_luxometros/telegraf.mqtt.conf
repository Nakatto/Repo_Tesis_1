# Telegraf MQTT input for ESP32 lux meters
# Merge this with your existing telegraf.conf on the Pi5.

[[inputs.mqtt_consumer]]
  servers = ["tcp://192.168.1.168:1883"]
  topics = [
    "lab/lux/esp32_01/#"
  ]
  client_id = "telegraf_pi5_lux"
  qos = 0
  connection_timeout = "30s"
  persistent_session = false

  # Keep topic as a tag; payload is a single numeric value.
  topic_tag = "topic"
  data_format = "value"
  data_type = "float"
  name_override = "luxometro"
  value_field_name = "value"

# Extract tags from topic: lab/lux/<device>/<sensor>/<metric>
[[processors.regex]]
  namepass = ["luxometro"]

  [[processors.regex.tags]]
    key = "topic"
    pattern = "^lab/lux/([^/]+)/([^/]+)/([^/]+)$"
    replacement = "${1}"
    result_key = "device"

  [[processors.regex.tags]]
    key = "topic"
    pattern = "^lab/lux/([^/]+)/([^/]+)/([^/]+)$"
    replacement = "${2}"
    result_key = "sensor"

  [[processors.regex.tags]]
    key = "topic"
    pattern = "^lab/lux/([^/]+)/([^/]+)/([^/]+)$"
    replacement = "${3}"
    result_key = "metric"

